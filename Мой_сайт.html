<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать Lame.exe — Космический портал</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        /* Звёздное небо (canvas) */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Основной контент */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
            animation: float 3s ease-in-out infinite;
        }

        .hero p {
            font-size: 1.2rem;
            margin-top: 1rem;
            opacity: 0.8;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        /* Секция с кнопкой */
        .content-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            z-index: 2;
            position: relative;
        }

        .download-container {
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .download-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .download-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(106, 17, 203, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(37, 117, 252, 0.8);
        }

        .file-info {
            margin-top: 1rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* Анимации */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* Планета (декорация) */
        .planet {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff7b54, #8b2f6b);
            width: 150px;
            height: 150px;
            top: 20%;
            left: 10%;
            box-shadow: 0 0 60px rgba(255, 123, 84, 0.4);
            transform: translateY(0);
            transition: transform 0.1s linear;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .download-btn { font-size: 1.2rem; padding: 0.8rem 2rem; }
            .planet { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <!-- Звёздное поле -->
    <canvas id="starfield"></canvas>

    <!-- Декоративная планета (параллакс) -->
    <div class="planet" id="planet"></div>

    <!-- Главный экран -->
    <div class="hero">
        <h1>Космический портал</h1>
        <p>Откройте доступ к файлу из другой галактики</p>
        <div class="scroll-indicator">▼ Прокрутите вниз ▼</div>
    </div>

    <!-- Секция с загрузкой -->
    <div class="content-section">
        <div class="download-container" id="downloadContainer">
            <a href="Lame.exe" download class="download-btn">
                🚀 Скачать Lame.exe
            </a>
            <div class="file-info">Lame.exe - кликер от новичка-программиста!</div>
        </div>
    </div>

    <script>
        // ====== 1. Звёздное небо с параллаксом ======
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height;
        const stars = [];
        const STAR_COUNT = 300;

        // Скорость параллакса (чем меньше, тем дальше слой)
        const PARALLAX_SPEED = 0.1;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initStars();
        }

        function initStars() {
            stars.length = 0;
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 2 + 0.5,
                    brightness: Math.random() * 0.7 + 0.3,
                    speed: Math.random() * 0.2 + 0.05 // своя скорость мерцания
                });
            }
        }

        function drawStars(scrollY) {
            ctx.clearRect(0, 0, width, height);

            // Двигаем звёзды вверх/вниз с параллаксом (эффект глубины)
            const offset = scrollY * PARALLAX_SPEED;

            for (const star of stars) {
                // Позиция с учётом параллакса
                let drawY = (star.y - offset) % height;
                if (drawY < 0) drawY += height;

                // Мерцание
                const alpha = star.brightness + Math.sin(Date.now() * 0.002 * star.speed) * 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, drawY, star.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ====== 2. Параллакс планеты ======
        const planet = document.getElementById('planet');

        function movePlanet(scrollY) {
            const speed = 0.3; // планета движется быстрее звёзд
            const yOffset = scrollY * speed;
            planet.style.transform = `translateY(${yOffset}px)`;
        }

        // ====== 3. Появление кнопки при скролле ======
        const downloadContainer = document.getElementById('downloadContainer');
        const SHOW_THRESHOLD = 300; // пикселей прокрутки, после которых кнопка покажется

        function checkScroll() {
            const scrollY = window.scrollY || window.pageYOffset;

            // Анимация звёзд и планеты
            drawStars(scrollY);
            movePlanet(scrollY);

            // Показываем кнопку, когда прокрутили достаточно
            if (scrollY > SHOW_THRESHOLD) {
                downloadContainer.classList.add('visible');
            } else {
                downloadContainer.classList.remove('visible');
            }

            requestAnimationFrame(checkScroll);
        }

        // ====== Инициализация ======
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        checkScroll(); // запускаем цикл отрисовки

        // Плавный скролл по стрелке
        document.querySelector('.scroll-indicator').addEventListener('click', () => {
            window.scrollTo({
                top: window.innerHeight,
                behavior: 'smooth'
            });
        });
    </script>
</body>
</html>
